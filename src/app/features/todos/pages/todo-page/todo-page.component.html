<div class="page">
  <h1>Yaksh's Todo List</h1>

  <section>
    <app-todo-form (submitTodo)="addTodo($event)"></app-todo-form>
  </section>

  <section class="panel">
    @if (loading()) {
      <div class="fade-in">Loading...</div>
    }

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    @if (!loading() && !error()) {
      <app-todo-list
        [todos]="todos()"
        (toggleTodoEvent)="toggleCompleteTodo($event)"
        (delete)="deleteTodo($event)"
      />
    }
  </section>
</div>
